name: Fetch Mentions (every 12h)

on:
  schedule:
    # Twice a day at 00:00 and 12:00 UTC to stay within GitHub Actions quota
    - cron: '0 0,12 * * *'
  workflow_dispatch: # allow manual trigger

concurrency:
  group: data-update
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Fetch 7-day mentions + engagement
        env:
          TWEETBINDER_API_KEY: ${{ secrets.TWEETBINDER_API_KEY }}
          TWEETBINDER_API_URL: ${{ secrets.TWEETBINDER_API_URL }}
        run: npm run fetch-mentions

      - name: Rebuild static JSON
        run: npm run build-static

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add server/data public/api
          if ! git diff --cached --quiet; then
            git commit -m "data: 7-day mentions + engagement update"
            git push
          else
            echo "No changes to commit"
          fi
