name: Fetch Twitter Data (daily)

on:
  schedule:
    # Daily at 12:00 UTC (one run/day to stay under Tweet Binder credit budget)
    - cron: '0 12 * * *'
  workflow_dispatch: # allow manual trigger

concurrency:
  group: data-update
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Fetch 7-day mentions + tweets + RTs received
        env:
          TWEETBINDER_API_KEY: ${{ secrets.TWEETBINDER_API_KEY }}
          TWEETBINDER_API_URL: ${{ secrets.TWEETBINDER_API_URL }}
        run: npm run fetch-twitter-data

      - name: Rebuild static JSON
        run: npm run build-static

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add server/data public/api
          if ! git diff --cached --quiet; then
            git commit -m "data: 7-day twitter data update"
            # Rebase onto any commits that landed on main while this job ran
            # (manual pushes, the trackers workflow, etc.) to avoid push races.
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "Push attempt $i failed, retrying..."
              sleep $((i * 5))
            done
          else
            echo "No changes to commit"
          fi
