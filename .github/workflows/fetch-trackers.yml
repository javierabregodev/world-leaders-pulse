name: Fetch Trackers (daily)

on:
  schedule:
    # Daily at 03:00 UTC — user tracker snapshots (followers, account stats)
    - cron: '0 3 * * *'
  workflow_dispatch:

concurrency:
  group: data-update
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Fetch user-tracker snapshots
        env:
          TWEETBINDER_API_KEY: ${{ secrets.TWEETBINDER_API_KEY }}
          TWEETBINDER_API_URL: ${{ secrets.TWEETBINDER_API_URL }}
        run: npm run fetch-trackers

      - name: Rebuild static JSON
        run: npm run build-static

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add server/data public/api
          if ! git diff --cached --quiet; then
            git commit -m "data: daily tracker snapshots"
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "Push attempt $i failed, retrying..."
              sleep $((i * 5))
            done
          else
            echo "No changes to commit"
          fi
